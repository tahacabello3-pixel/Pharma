<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💊 Pharma ✅ · Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #7b2ff7;
            --success: #00e676;
            --error: #ff5252;
            --warning: #ffc107;
            --bg-dark: #050a0f;
            --bg-card: rgba(255, 255, 255, 0.03);
            --text: #e3f2fd;
            --text-dim: #a0aec0;
            --glass: rgba(10, 15, 25, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body.light-mode {
            --bg-dark: #f8fafc;
            --bg-card: rgba(0, 0, 0, 0.02);
            --text: #0f172a;
            --text-dim: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: var(--transition); }
        
        body {
            font-family: 'Plus Jakarta Sans', 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg-dark); }
        .bg-blobs { position: absolute; width: 100%; height: 100%; filter: blur(80px); opacity: 0.4; }
        .blob { position: absolute; border-radius: 50%; animation: float 25s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: var(--primary); top: -100px; left: -100px; opacity: 0.2; }
        .blob-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; opacity: 0.2; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 60%; opacity: 0.1; animation-delay: -10s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10vw, 5vh) scale(1.1); }
            66% { transform: translate(-5vw, 15vh) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        #app { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid var(--border); margin-bottom: 40px;
            position: sticky; top: 20px; z-index: 1000;
            box-shadow: var(--card-shadow);
        }
        
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .logo { 
            font-size: 1.6rem; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-controls { display: flex; gap: 15px; align-items: center; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-bar {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 12px 15px 12px 45px; color: var(--text); font-family: inherit; outline: none; width: 220px;
            font-size: 0.95rem;
        }
        .search-bar:focus { width: 320px; border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .search-icon { position: absolute; left: 18px; opacity: 0.5; font-size: 0.9rem; }

        .control-btn {
            width: 45px; height: 45px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .control-btn:hover { background: var(--primary); color: #000; transform: translateY(-2px); border-color: var(--primary); }

        .mode-toggle {
            display: flex; background: var(--bg-card); padding: 5px; border-radius: 18px; border: 1px solid var(--border);
        }
        .mode-opt {
            padding: 8px 20px; border: none; background: transparent; color: var(--text-dim);
            cursor: pointer; border-radius: 14px; font-weight: 600; font-size: 0.9rem;
        }
        .mode-opt.active { background: var(--primary); color: #000; font-weight: 700; box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3); }

        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); 
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--glass); padding: 60px 40px; border-radius: 32px;
            border: 1px solid var(--border); max-width: 450px; width: 90%; text-align: center;
            box-shadow: var(--card-shadow);
        }
        .login-card h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 800; }
        .login-card p { color: var(--text-dim); margin-bottom: 35px; }
        .input-group { position: relative; margin-bottom: 25px; }
        .input-field {
            width: 100%; padding: 18px 20px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 18px; color: var(--text); font-size: 1.1rem; outline: none;
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); }
        .primary-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; border: none; border-radius: 18px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }
        .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 210, 255, 0.4); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .section-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card {
            background: var(--glass); padding: 35px; border-radius: 28px; border: 1px solid var(--border);
            cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--card-shadow);
            display: flex; flex-direction: column; justify-content: space-between; height: 100%;
        }
        .card:hover { transform: translateY(-12px); border-color: var(--primary); }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary)); opacity: 0.8;
        }
        .card h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; line-height: 1.3; }
        .card-stats { display: flex; gap: 15px; margin-top: 20px; font-size: 0.85rem; font-weight: 600; color: var(--text-dim); }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-item i { color: var(--primary); }

        .progress-ring { height: 6px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 10px; width: 0%; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .q-card { 
            background: var(--glass); padding: 45px; border-radius: 32px; border: 1px solid var(--border);
            margin-bottom: 30px; box-shadow: var(--card-shadow); position: relative;
        }
        .q-meta { font-size: 0.9rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .q-actions { display: flex; gap: 10px; }
        .action-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
            width: 35px; height: 35px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
            transition: var(--transition);
        }
        .action-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); transform: scale(1.1); }
        .copy-all-btn {
            margin-bottom: 20px; padding: 12px 25px; background: var(--bg-card);
            border: 1px solid var(--primary); color: var(--primary); border-radius: 15px;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: var(--transition); width: fit-content;
        }
        .copy-all-btn:hover { background: var(--primary); color: #000; }
        .q-text { font-size: 1.75rem; font-weight: 800; line-height: 1.4; margin-bottom: 40px; }
        
        .options-container { display: grid; gap: 18px; }
        .option {
            background: var(--bg-card); padding: 22px 28px; border-radius: 22px; border: 2px solid var(--border);
            cursor: pointer; display: flex; align-items: center; gap: 20px; font-size: 1.15rem; font-weight: 600;
        }
        .option:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .option.selected { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); }
        .option.correct { border-color: var(--success); background: rgba(0, 230, 118, 0.1); color: var(--success); }
        .option.wrong { border-color: var(--error); background: rgba(255, 82, 82, 0.1); color: var(--error); }
        .option.disabled { pointer-events: none; }
        
        .opt-id {
            width: 40px; height: 40px; border-radius: 12px; background: var(--border);
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem;
        }
        .option.correct .opt-id { background: var(--success); color: #000; }
        .option.wrong .opt-id { background: var(--error); color: #fff; }

        .explanation {
            margin-top: 35px; padding: 30px; border-radius: 24px; background: rgba(0, 230, 118, 0.05);
            border-left: 6px solid var(--success); animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .quiz-nav { display: flex; justify-content: space-between; gap: 20px; margin-top: 40px; }
        .nav-btn {
            padding: 18px 35px; border-radius: 18px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text); cursor: pointer;
            font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 12px;
        }
        .nav-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .nav-btn.primary { background: var(--primary); color: #000; border: none; box-shadow: 0 8px 20px rgba(0, 210, 255, 0.2); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .stats-modal {
            background: var(--glass); padding: 50px; border-radius: 32px; border: 1px solid var(--border);
            max-width: 550px; width: 90%; text-align: center; box-shadow: var(--card-shadow);
        }
        .score-display {
            width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--primary);
            margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .score-val { font-size: 3rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .score-label { font-size: 0.9rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        .badge { background: var(--primary); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; vertical-align: middle; margin-left: 8px; }
        .hidden { display: none !important; }
        .text-primary { color: var(--primary); }

        footer { margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .footer-link { color: var(--text-dim); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .footer-link:hover { color: var(--primary); }

        .type-toggle {
            display: flex; background: var(--bg-card); padding: 5px; border-radius: 18px; border: 1px solid var(--border); margin-right: 10px;
        }
        .type-opt {
            padding: 8px 15px; border: none; background: transparent; color: var(--text-dim);
            cursor: pointer; border-radius: 14px; font-weight: 600; font-size: 0.85rem;
        }
        .type-opt.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(123, 47, 247, 0.3); }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <div class="bg-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>

    <div id="app">

            <div class="nav-controls">

                    <i class="fas fa-search search-icon"></i>

                <div class="type-toggle">

        <main id="view-home">

                <div style="text-align:right">
                    <div style="font-size:1.5rem; font-weight:800;" id="global-percent">0%</div>

        <div id="view-list" class="hidden">

                </button>
            </div>
            <div id="list-container">
                <!-- List injected here -->
            </div>
        </div>

        <footer>
            <p>© 2026 Pharma Pro Edition · All Rights Reserved</p>
            <div class="footer-links">
                <a href="https://t.me/zik0d" target="_blank" class="footer-link">
                    <i class="fab fa-telegram"></i> @zik0d
                </a>
                <a href="https://t.me/ti_6idz" target="_blank" class="footer-link">
                    <i class="fas fa-bullhorn"></i> My Channel
                </a>
            </div>

    </div>

    <div id="stats-overlay" class="overlay hidden">
        <div class="stats-modal">
            <div class="score-display">
                <div id="final-score-pct" class="score-val">0%</div>
                <div class="score-label">Final Score</div>
            </div>
            <h2 style="font-size:2rem; margin-bottom:10px">Quiz Completed!</h2>
            <p style="color:var(--text-dim); margin-bottom:30px">
                You got <span id="stat-correct" class="text-primary">0</span> out of <span id="stat-total">0</span> questions correct.

    <script>
        // Data Structure
        const allQuestions = [
            // Introduction (179 questions - Years)
            { sheet: 'Introduction', type: 'MCQ', question: '1. The branch of pharmacology that deals with absorption, distribution, metabolism and excretion of drugs', options: ['Pharmacodynamics', 'Pharmacokinetics', 'Pharmacotherapeutics', 'Toxicology'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '2. The study of the biochemical and physiological effects of drugs and their mechanisms of action', options: ['Pharmacokinetics', 'Pharmacodynamics', 'Pharmacotherapeutics', 'Clinical pharmacology'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '3. What does the word "Pharmacology" mean?', options: ['Study of drugs', 'Study of poisons', 'Study of body functions', 'Study of disease treatment'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '4. Science concerned with study of effects of drugs in human beings is:', options: ['Toxicology', 'applied pharmacology', 'clinical pharmacology', 'none of the above'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '5. The science that deals with adverse effects of drugs, is:', options: ['Pharmacognosy', 'Pharmaceutics', 'Toxicology'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '6. What are the sources of drugs? Mention one example for each:', options: ['Natural only', 'Chemical only', 'Natural and chemical sources', 'Synthetic only'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '7. Branch of Pharmacology deals with the adverse effects of drugs is:', options: ['Clinical Pharmacology', 'Medical Pharmacology', 'Toxicology', 'Pharmacotherapeutics', 'None of the above'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '8. Aspegic is:', options: ['Chemical name', 'Generic name', 'Trade mark name', 'Non-proprietary name', '(c) and (d)'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '9. Adol is generic name:', options: ['True', 'False'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '10. Xylocaine is generic name:', options: ['True', 'False'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '11. Tylenol is:', options: ['Generic name', 'Trade name', 'Official name', '(b and c)', 'None of above'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '12. Octacaine is:', options: ['Chemical name', 'Trade mark name', 'Generic name', 'Non-proprietary name', '(c) and (d)'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '13. For each drug there is:', options: ['More than one name', 'Only one trade name', 'Both are correct'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '14. All the following are related to sources of drugs, except:', options: ['Plant origin', 'Animal origin', 'Synthetic compounds', 'Semi-synthetic compounds', 'Biological origin'], correct: 'E', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '15. The following names are for Paracetamol/Acetaminophen EXCEPT:', options: ['Panadol', 'Tylenol', 'Adol', 'Aspro'], correct: 'D', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '16. Aspirin is ............. name of Acetylsalicylic acid:', options: ['Chemical', 'Generic', 'Trade', 'Proprietary'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '17. Regarding passive diffusion of drugs across biological membranes, all the following statements are correct, except:', options: ['Ionized molecules are more absorbable than unionized ones', 'Acidic conditions favour the transport of weak acidic compounds', 'Alkaline conditions favour the transport of weak basic compounds'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '18. If diffusion depended on concentration gradient across a membrane called:', options: ['Passive diffusion', 'Active transport', 'Filtration', 'Endocytosis and exocytosis', 'None of the above'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '19. Passive diffusion determined by ionization and lipid solubility of drugs molecules:', options: ['True', 'False'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '20. Panadol is generic name:', options: ['True', 'False'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '21. Main drugs cross membranes by:', options: ['Passive diffusion', 'Active diffusion', 'Filtration', 'Exocytosis', 'All above'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '22. When the drug passes a biological membrane after forming a complex with a specific membrane constituent, this is known as:', options: ['Passive diffusion', 'Filtration', 'Active transport'], correct: 'C', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '23. Through the fenestrations, the materials commonly pass regarding any fact:', options: ['True', 'False'], correct: 'A', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '24. Drug discharge is:', options: ['Endocytosis', 'Exocytosis', 'Filtration', 'Active diffusion', 'None of above'], correct: 'B', category: 'year' },
            { sheet: 'Introduction', type: 'MCQ', question: '25. Migraine is cause:', options: ['Fast absorption', 'Fast distribution', 'Slow absorption', 'Slow distribution', 'None of above'], correct: 'C', category: 'year' },

        const sheetNames = [
            'Introduction',
            'Autonomic nerve system',
            'Autonomic nerve system (histamine)',
            'Antimicrobial agent',
            'Opioid'
        ];
        
        // State
        let currentSheet = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let progressData = {};
        let bookmarks = [];
        let appMode = 'quiz'; // 'quiz' or 'study'
        let questionCategory = 'quiz'; // 'year' or 'quiz'
        let timerInterval = null;
        let secondsElapsed = 0;

        // Init
        window.onload = () => {
            const savedProgress = localStorage.getItem(`pharma_progress_final_v2`);
            progressData = savedProgress ? JSON.parse(savedProgress) : {};
            
            const savedBookmarks = localStorage.getItem(`pharma_bookmarks_final_v2`);
            bookmarks = savedBookmarks ? JSON.parse(savedBookmarks) : [];

            renderDashboard();
            updateGlobalProgress();
        };

        function setAppMode(mode) {
            appMode = mode;
            document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
            document.getElementById('mode-study').classList.toggle('active', mode === 'study');
            
            if (currentSheet) {
                startTopic(currentSheet);
            }
        }

        function setQuestionType(type) {
            questionCategory = type;
            document.getElementById('type-year').classList.toggle('active', type === 'year');
            document.getElementById('type-quiz').classList.toggle('active', type === 'quiz');
            
            if (currentSheet) {
                startTopic(currentSheet);
            } else {
                renderDashboard();
            }
        }

        function goHome() {
            stopTimer();
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
            currentSheet = null;
            renderDashboard();
            updateGlobalProgress();
        }

        function renderDashboard() {
            const grid = document.getElementById('sheets-grid');
            grid.innerHTML = '';
            
            sheetNames.forEach(sheet => {
                const qCount = allQuestions.filter(q => q.sheet === sheet && q.category === questionCategory).length;
                const progress = progressData[sheet] || 0;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => startTopic(sheet);
                card.innerHTML = `
                    <div>
                        <h3>${sheet}</h3>
                        <div class="card-stats">
                            <div class="stat-item"><i class="fas fa-file-alt"></i> ${qCount} Questions</div>
                            <div class="stat-item"><i class="fas fa-chart-line"></i> ${progress}% Mastery</div>
                        </div>
                    </div>
                    <div class="progress-ring">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateGlobalProgress() {
            const values = Object.values(progressData);
            const avg = values.length > 0 ? Math.round(values.reduce((a,b) => a+b, 0) / sheetNames.length) : 0;
            document.getElementById('global-percent').textContent = avg + '%';
        }

        function startTopic(name) {
            currentSheet = name;
            currentQuestions = allQuestions.filter(q => q.sheet === name && q.category === questionCategory);
            currentIndex = 0;
            userAnswers = {};
            
            if (currentQuestions.length === 0) {
                alert('No questions available in this category for this section.');
                return;
            }

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            
            if (appMode === 'quiz') {
                document.getElementById('view-quiz').classList.remove('hidden');
                startTimer();
                renderQuestion();
            } else {
                document.getElementById('view-list').classList.remove('hidden');
                renderStudyList(name, currentQuestions);
            }
            window.scrollTo(0,0);
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const container = document.getElementById('question-container');
            const answered = userAnswers[currentIndex] !== undefined;
            
            document.getElementById('q-counter').textContent = `Question ${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('quiz-progress-fill').style.width = `${((currentIndex + 1) / currentQuestions.length) * 100}%`;
            
            let optionsHtml = '';
            if (q.options) {
                optionsHtml = `<div class="options-container">` + q.options.map((opt, i) => {
                    const letter = String.fromCharCode(65 + i);
                    
                    let cls = 'option';
                    if (answered) {
                        cls += ' disabled';
                        if (letter === q.correct) cls += ' correct';
                        else if (userAnswers[currentIndex] === letter) cls += ' wrong';
                    } else if (userAnswers[currentIndex] === letter) {
                        cls += ' selected';
                    }
                    
                    return `
                        <div class="${cls}" onclick="handleOptionSelect('${letter}')">
                            <div class="opt-id">${letter}</div>
                            <span>${opt}</span>
                        </div>
                    `;
                }).join('') + `</div>`;
            }

            container.innerHTML = `
                <div class="q-card">
                    <div class="q-meta">
                        <span><i class="fas fa-graduation-cap"></i> ${currentSheet}</span>
                        <div class="q-actions">
                            <button class="action-btn" onclick="copyQuestionOnly(${currentIndex})" title="Copy Question"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="q-text">${q.question}</div>
                    ${optionsHtml}
                    ${answered ? `
                        <div class="explanation">
                            <div style="font-weight: 800; color: var(--success); margin-bottom: 10px;">
                                <i class="fas fa-check-circle"></i> Correct Answer: ${q.correct}
                            </div>
                            ${q.note ? `<div style="opacity: 0.9; font-size: 0.95rem;">💡 ${q.note}</div>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerHTML = currentIndex === currentQuestions.length - 1 ? 
                'Finish Quiz <i class="fas fa-flag-checkered"></i>' : 
                'Next Question <i class="fas fa-arrow-right"></i>';
            
            updateBookmarkBtn();
        }

        function handleOptionSelect(val) {
            if (userAnswers[currentIndex] !== undefined) return;
            userAnswers[currentIndex] = val;
            renderQuestion();
            
            setTimeout(() => {
                const exp = document.querySelector('.explanation');
                if (exp) exp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function navigateQuestion(dir) {
            const newIndex = currentIndex + dir;
            if (newIndex >= 0 && newIndex < currentQuestions.length) {
                currentIndex = newIndex;
                renderQuestion();
                window.scrollTo(0,0);
            } else if (newIndex >= currentQuestions.length) {
                finishQuiz();
            }
        }

        function finishQuiz() {
            stopTimer();
            const correctCount = Object.keys(userAnswers).filter(idx => userAnswers[idx] === currentQuestions[idx].correct).length;
            const total = currentQuestions.length;
            const percent = Math.round((correctCount / total) * 100);
            
            progressData[currentSheet] = Math.max(progressData[currentSheet] || 0, percent);
            localStorage.setItem(`pharma_progress_final_v2`, JSON.stringify(progressData));
            
            document.getElementById('final-score-pct').textContent = percent + '%';
            document.getElementById('stat-correct').textContent = correctCount;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stats-overlay').classList.remove('hidden');
            
            if (percent >= 80) createConfetti();
        }

        function closeStats() {
            document.getElementById('stats-overlay').classList.add('hidden');
            goHome();
        }

        function renderStudyList(title, questions) {
            document.getElementById('list-title').textContent = title;
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            if (questions.length === 0) {
                container.innerHTML = `<div class="q-card" style="text-align:center; opacity:0.5;">No results found.</div>`;
                return;
            }

            const copyAllBtn = document.createElement('button');
            copyAllBtn.className = 'copy-all-btn';
            copyAllBtn.innerHTML = '<i class="fas fa-copy"></i> Copy All Questions';
            copyAllBtn.onclick = copyAllStudyQuestions;
            container.appendChild(copyAllBtn);

            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'q-card';
                
                let optsHtml = '';
                if (q.options) {
                    optsHtml = `<div class="options-container" style="margin-top:20px; pointer-events:none;">` + q.options.map((o, j) => {
                        const letter = String.fromCharCode(65+j);
                        const isCorrect = letter === q.correct;
                        return `
                            <div class="option ${isCorrect ? 'correct' : ''}" style="opacity: ${isCorrect ? '1' : '0.6'}">
                                <div class="opt-id">${letter}</div>
                                <span>${o}</span>
                            </div>
                        `;
                    }).join('') + `</div>`;
                }

                card.innerHTML = `
                    <div style="opacity:0.5; margin-bottom:10px; font-weight:700;">${q.sheet} · Q${i+1}</div>
                    <div class="q-text" style="font-size:1.3rem;">${q.question}</div>
                    ${optsHtml}
                `;
                container.appendChild(card);
            });
        }

        function handleSearch(e) {
            const term = e.target.value.toLowerCase();
            if (!term) {
                if (!currentSheet) goHome();
                else startTopic(currentSheet);
                return;
            }

            const results = allQuestions.filter(q => 
                q.question.toLowerCase().includes(term)
            ).slice(0, 50);

            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            renderStudyList(`Search Results: "${term}"`, results);
        }

        function toggleCurrentBookmark() {
            const q = currentQuestions[currentIndex];
            const qId = `${q.sheet}-${q.question}`;
            const existingIdx = bookmarks.findIndex(b => b.proId === qId);
            
            if (existingIdx > -1) {
                bookmarks.splice(existingIdx, 1);
            } else {
                bookmarks.push({ ...q, proId: qId });
            }
            
            localStorage.setItem(`pharma_bookmarks_final_v2`, JSON.stringify(bookmarks));
            updateBookmarkBtn();
        }

        function updateBookmarkBtn() {
            const q = currentQuestions[currentIndex];
            if(!q) return;
            const qId = `${q.sheet}-${q.question}`;
            const isBookmarked = bookmarks.some(b => b.proId === qId);
            const btn = document.getElementById('bookmark-btn');
            
            btn.innerHTML = isBookmarked ? '<i class="fas fa-bookmark"></i> Saved' : '<i class="far fa-bookmark"></i> Save';
            btn.style.color = isBookmarked ? 'var(--primary)' : 'inherit';
        }

        function showBookmarks() {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            
            document.getElementById('list-title').textContent = "Saved Questions";
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            if (bookmarks.length === 0) {
                container.innerHTML = `<div class="q-card" style="text-align:center; opacity:0.5; padding: 60px;">
                    <i class="fas fa-bookmark" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <p>No saved questions yet.</p>
                </div>`;
                return;
            }

            bookmarks.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'q-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <span style="opacity:0.6; font-weight:700;">${q.sheet}</span>
                        <button class="nav-btn" style="padding:8px 15px; font-size:0.8rem; color:var(--error); border-color:var(--error);" onclick="removeBookmark('${q.proId}')">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                    </div>
                    <div class="q-text" style="font-size:1.3rem;">${q.question}</div>
                    <div class="explanation">
                        <b>Answer:</b> ${q.correct}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function removeBookmark(id) {
            bookmarks = bookmarks.filter(b => b.proId !== id);
            localStorage.setItem(`pharma_bookmarks_final_v2`, JSON.stringify(bookmarks));
            showBookmarks();
        }

        function copyQuestionOnly(idx) {
            const q = currentQuestions[idx];
            const text = `${q.question}\n\n` + q.options.map((o, i) => `${String.fromCharCode(65+i)}) ${o}`).join('\n');
            navigator.clipboard.writeText(text).then(() => alert('Question copied!'));
        }

        function copyAllStudyQuestions() {
            const text = currentQuestions.map((q, i) => 
                `Q${i+1}: ${q.question}\n` + 
                q.options.map((o, j) => `  ${String.fromCharCode(65+j)}) ${o}`).join('\n') + 
                `\nAnswer: ${q.correct}\n`
            ).join('\n---\n\n');
            navigator.clipboard.writeText(text).then(() => alert('All questions copied!'));
        }

        function startTimer() {
            stopTimer();
            secondsElapsed = 0;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(secondsElapsed / 60);
            const secs = secondsElapsed % 60;
            document.getElementById('quiz-timer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-toggle').innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
            }
            .confetti { position: fixed; top: -10px; width: 10px; height: 10px; z-index: 3000; }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
